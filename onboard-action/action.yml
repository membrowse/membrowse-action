name: 'MemBrowse - Historical Memory Baseline'
description: 'Analyze memory usage across past commits to establish an initial baseline.'
author: 'MemBrowse'

inputs:
  num_commits:
    description: 'Number of historical commits to process (required unless commits is provided)'
    required: false
    default: ''
  commits:
    description: 'Space-separated list of commit hashes and/or tags to process. Mutually exclusive with num_commits and initial_commit.'
    required: false
    default: ''
  build_script:
    description: 'Shell command to build the firmware'
    required: true
  elf:
    description: 'Path to generated ELF file after build'
    required: true
  ld:
    description: 'Space-separated list of linker script paths (optional - if omitted, uses default Code/Data regions)'
    required: false
    default: ''
  target_name:
    description: 'Target platform name'
    required: true
  api_key:
    description: 'API key for MemBrowse'
    required: true
  api_url:
    description: 'MemBrowse API base URL (/upload appended automatically)'
    required: false
    default: 'https://api.membrowse.com'
  linker_vars:
    description: 'Space-separated linker variable definitions (e.g., "__micropy_flash_size__=4096K RAM_START=0x20000000")'
    required: false
    default: ''
  build_dirs:
    description: 'Space-separated directories that trigger rebuilds. Commits with no changes in these directories upload metadata-only reports.'
    required: false
    default: ''
  initial_commit:
    description: 'Start processing from this commit hash. If the path to HEAD has fewer than num_commits, only those commits are processed.'
    required: false
    default: ''
  initial_parent:
    description: 'Set the parent of the first commit when using the commits input. Use this to chain multiple runs together. The ref is resolved to a commit hash. Only valid with commits.'
    required: false
    default: ''
  binary_search:
    description: 'Use binary search to minimize builds. Builds endpoints, compares memory fingerprints, and only builds midpoints where changes are detected.'
    required: false
    default: 'false'
  map_file:
    description: 'Path to linker map file for archive/object file attribution (supports GNU LD and IAR formats)'
    required: false
    default: ''
  verbose:
    description: 'Set logging level: DEBUG, INFO, or WARNING (default: WARNING)'
    required: false
    default: 'WARNING'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: ${{ job.container.id == '' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Detect Python interpreter
      id: detect-python
      shell: bash
      run: |
        if command -v python3 &>/dev/null; then
          PYTHON=python3
        elif command -v python &>/dev/null; then
          PYTHON=python
        else
          echo "::error::Python not found. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        if ! "$PYTHON" -m pip --version &>/dev/null; then
          echo "::error::pip not found for $PYTHON. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        echo "python=$PYTHON" >> "$GITHUB_OUTPUT"

    - name: Install membrowse package
      shell: bash
      run: |
        INSTALL_PATH="${{ github.action_path }}/.."
        # In container jobs, github.action_path uses the host path which doesn't
        # exist inside the container. Derive the container prefix from GITHUB_WORKSPACE.
        if [ ! -d "$INSTALL_PATH" ]; then
          if [[ "$INSTALL_PATH" == */_actions/* ]] && [ -n "${GITHUB_WORKSPACE:-}" ]; then
            HOST_PREFIX="${INSTALL_PATH%%/_actions/*}"
            CONTAINER_PREFIX="${GITHUB_WORKSPACE%/*/*}"
            if [ -n "$CONTAINER_PREFIX" ]; then
              INSTALL_PATH="${INSTALL_PATH/$HOST_PREFIX/$CONTAINER_PREFIX}"
              echo "Resolved container install path: $INSTALL_PATH"
            fi
          fi
          if [ ! -d "$INSTALL_PATH" ]; then
            echo "::error::Could not resolve membrowse package path. Tried: ${{ github.action_path }}/.. and $INSTALL_PATH"
            exit 1
          fi
        fi
        ${{ steps.detect-python.outputs.python }} -m pip install --force-reinstall --no-cache-dir "$INSTALL_PATH"

    - name: Fetch full git history
      shell: bash
      run: |
        git fetch --unshallow || true
        git fetch --all
    
    - name: Run historical analysis
      shell: bash
      env:
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_COMMITS: ${{ inputs.commits }}
        INPUT_NUM_COMMITS: ${{ inputs.num_commits }}
        INPUT_BUILD_SCRIPT: ${{ inputs.build_script }}
        INPUT_ELF: ${{ inputs.elf }}
        INPUT_TARGET_NAME: ${{ inputs.target_name }}
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_LD: ${{ inputs.ld }}
        INPUT_LINKER_VARS: ${{ inputs.linker_vars }}
        INPUT_BUILD_DIRS: ${{ inputs.build_dirs }}
        INPUT_INITIAL_COMMIT: ${{ inputs.initial_commit }}
        INPUT_INITIAL_PARENT: ${{ inputs.initial_parent }}
        INPUT_MAP_FILE: ${{ inputs.map_file }}
        INPUT_BINARY_SEARCH: ${{ inputs.binary_search }}
      run: |
        # Global args (before subcommand)
        GLOBAL_ARGS=()
        if [ "$INPUT_VERBOSE" != "WARNING" ]; then
          GLOBAL_ARGS+=(--verbose "$INPUT_VERBOSE")
        fi

        # Subcommand args
        ONBOARD_ARGS=()

        # Commit selection: either --commits or num_commits (positional)
        if [ -n "$INPUT_COMMITS" ]; then
          ONBOARD_ARGS+=(--commits "$INPUT_COMMITS")
        elif [ -n "$INPUT_NUM_COMMITS" ]; then
          ONBOARD_ARGS+=("$INPUT_NUM_COMMITS")
        else
          echo "Error: either num_commits or commits must be provided"
          exit 1
        fi

        # Remaining positional args
        ONBOARD_ARGS+=(
          "$INPUT_BUILD_SCRIPT"
          "$INPUT_ELF"
          "$INPUT_TARGET_NAME"
          "$INPUT_API_KEY"
        )

        # Pass api_url via --api-url flag (works with both --commits and num_commits modes)
        if [ -n "$INPUT_API_URL" ]; then
          ONBOARD_ARGS+=(--api-url "$INPUT_API_URL")
        fi

        # Add ld scripts if provided (optional - uses default Code/Data regions if omitted)
        if [ -n "$INPUT_LD" ]; then
          ONBOARD_ARGS+=(--ld-scripts "$INPUT_LD")
        fi

        # Add linker variable definitions
        if [ -n "$INPUT_LINKER_VARS" ]; then
          for var in $INPUT_LINKER_VARS; do
            ONBOARD_ARGS+=(--def "$var")
          done
        fi

        # Add build directories filter
        if [ -n "$INPUT_BUILD_DIRS" ]; then
          ONBOARD_ARGS+=(--build-dirs $INPUT_BUILD_DIRS)
        fi

        # Add initial commit
        if [ -n "$INPUT_INITIAL_COMMIT" ]; then
          ONBOARD_ARGS+=(--initial-commit "$INPUT_INITIAL_COMMIT")
        fi

        # Add initial parent (for chaining --commits runs)
        if [ -n "$INPUT_INITIAL_PARENT" ]; then
          ONBOARD_ARGS+=(--initial-parent "$INPUT_INITIAL_PARENT")
        fi

        # Add map file if provided
        if [ -n "$INPUT_MAP_FILE" ]; then
          ONBOARD_ARGS+=(--map-file "$INPUT_MAP_FILE")
        fi

        # Add binary search mode
        if [ "$INPUT_BINARY_SEARCH" = "true" ]; then
          ONBOARD_ARGS+=(--binary-search)
        fi

        membrowse "${GLOBAL_ARGS[@]}" onboard "${ONBOARD_ARGS[@]}"

branding:
  icon: 'clock'
  color: 'green'