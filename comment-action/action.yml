name: 'MemBrowse - PR Memory Summary'
description: 'Post a consolidated PR comment summarizing memory changes across targets.'
author: 'MemBrowse'

inputs:
  json_files:
    description: 'Space-separated list of JSON report file paths or glob pattern (e.g., "reports/*.json")'
    required: false
  api_key:
    description: 'MemBrowse API key (for summary mode — fetches data from the API instead of JSON files)'
    required: false
  commit:
    description: 'Commit SHA to fetch summary for (requires api_key)'
    required: false
  pr_number:
    description: 'PR number to post comment on (auto-detected from event context or commit SHA via GitHub API)'
    required: false
  api_url:
    description: 'MemBrowse API base URL (default: https://api.membrowse.com)'
    required: false
    default: 'https://api.membrowse.com'
  comment_template:
    description: 'Optional path to custom Jinja2 template file for comment formatting'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: ${{ job.container.id == '' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Detect Python interpreter
      id: detect-python
      shell: bash
      run: |
        if command -v python3 &>/dev/null; then
          PYTHON=python3
        elif command -v python &>/dev/null; then
          PYTHON=python
        else
          echo "::error::Python not found. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        if ! "$PYTHON" -m pip --version &>/dev/null; then
          echo "::error::pip not found for $PYTHON. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        echo "python=$PYTHON" >> "$GITHUB_OUTPUT"

    - name: Install membrowse package
      shell: bash
      run: |
        INSTALL_PATH="${{ github.action_path }}/.."
        # In container jobs, github.action_path uses the host path which doesn't
        # exist inside the container. Derive the container prefix from GITHUB_WORKSPACE.
        if [ ! -d "$INSTALL_PATH" ]; then
          if [[ "$INSTALL_PATH" == */_actions/* ]] && [ -n "${GITHUB_WORKSPACE:-}" ]; then
            HOST_PREFIX="${INSTALL_PATH%%/_actions/*}"
            CONTAINER_PREFIX="${GITHUB_WORKSPACE%/*/*}"
            if [ -n "$CONTAINER_PREFIX" ]; then
              INSTALL_PATH="${INSTALL_PATH/$HOST_PREFIX/$CONTAINER_PREFIX}"
              echo "Resolved container install path: $INSTALL_PATH"
            fi
          fi
          if [ ! -d "$INSTALL_PATH" ]; then
            echo "::error::Could not resolve membrowse package path. Tried: ${{ github.action_path }}/.. and $INSTALL_PATH"
            exit 1
          fi
        fi
        ${{ steps.detect-python.outputs.python }} -m pip install --force-reinstall --no-cache-dir "$INSTALL_PATH"

    - name: Post combined PR comment
      shell: bash
      run: |
        # Summary mode: api_key + commit
        if [ -n "${{ inputs.api_key }}" ] && [ -n "${{ inputs.commit }}" ]; then
          # Resolve PR number from explicit input or event context
          PR_NUMBER="${{ inputs.pr_number }}"
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          # Fetch summary JSON (single API call)
          membrowse summary "${{ inputs.commit }}" \
            --api-key "${{ inputs.api_key }}" \
            --api-url "${{ inputs.api_url }}" \
            --json > /tmp/membrowse-summary.json

          # Post comment: extracts pr_number from JSON if not provided,
          # renders template, and posts in one step
          COMMENT_ARGS=(--summary-json /tmp/membrowse-summary.json)
          if [ -n "$PR_NUMBER" ]; then
            COMMENT_ARGS+=(--pr-number "$PR_NUMBER")
          fi
          if [ -n "${{ inputs.comment_template }}" ]; then
            COMMENT_ARGS+=(--comment-template "${{ inputs.comment_template }}")
          fi
          ${{ steps.detect-python.outputs.python }} -m membrowse.utils.github_comment "${COMMENT_ARGS[@]}"
        else
          # File mode (backward compat)
          ARGS=()
          if [ -n "${{ inputs.comment_template }}" ]; then
            ARGS+=(--comment-template "${{ inputs.comment_template }}")
          fi

          shopt -s nullglob
          FILES=(${{ inputs.json_files }})
          shopt -u nullglob

          ${{ steps.detect-python.outputs.python }} -m membrowse.utils.github_comment "${ARGS[@]}" "${FILES[@]}"
        fi

branding:
  icon: 'message-circle'
  color: 'purple'
