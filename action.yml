name: 'Binary Size & Memory Footprint Tracking'
description: 'Track and analyze firmware memory footprint across commits and PRs to catch memory regressions.'
author: 'MemBrowse'

inputs:
  elf:
    description: 'Path to ELF file (not required when identical=true)'
    required: false
  ld:
    description: 'Space-separated list of linker script paths (optional - if omitted, uses default Code/Data regions)'
    required: false
  target_name:
    description: 'Target name like esp32, stm32f4'
    required: true
  api_key:
    description: 'API key for MemBrowse'
    required: false
  api_url:
    description: 'MemBrowse API base URL (/upload appended automatically)'
    required: false
    default: 'https://api.membrowse.com'
  dont_fail_on_alerts:
    description: 'Continue even if budget alerts are detected (default: fail on alerts)'
    required: false
    default: 'false'
  linker_vars:
    description: 'Space-separated linker variable definitions (e.g., "__micropy_flash_size__=4096K RAM_START=0x20000000")'
    required: false
    default: ''
  verbose:
    description: 'Enable verbose output including full API responses (default: WARNING)'
    required: false
    default: 'WARNING'
  pr_author_name:
    description: 'PR author name (auto-detected from GitHub event if not provided)'
    required: false
    default: ''
  pr_author_email:
    description: 'PR author email (auto-detected from GitHub event if not provided)'
    required: false
    default: ''
  identical:
    description: 'Mark this commit as having identical memory footprint to previous (metadata-only upload)'
    required: false
    default: 'false'
  map_file:
    description: 'Path to linker map file for archive/object file attribution (supports GNU LD and IAR formats)'
    required: false
    default: ''

outputs:
  report_path:
    description: 'Path to the generated JSON report file'
    value: ${{ steps.analysis.outputs.report_path }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      if: ${{ job.container.id == '' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Detect Python interpreter
      id: detect-python
      shell: bash
      run: |
        if command -v python3 &>/dev/null; then
          PYTHON=python3
        elif command -v python &>/dev/null; then
          PYTHON=python
        else
          echo "::error::Python not found. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        if ! "$PYTHON" -m pip --version &>/dev/null; then
          echo "::error::pip not found for $PYTHON. Python + pip must be present in the job container image, or run this action outside a container."
          exit 1
        fi
        echo "python=$PYTHON" >> "$GITHUB_OUTPUT"

    - name: Install membrowse package
      shell: bash
      run: |
        INSTALL_PATH="${{ github.action_path }}"
        # In container jobs, github.action_path uses the host path which doesn't
        # exist inside the container. Derive the container prefix from GITHUB_WORKSPACE.
        if [ ! -d "$INSTALL_PATH" ]; then
          if [[ "$INSTALL_PATH" == */_actions/* ]] && [ -n "${GITHUB_WORKSPACE:-}" ]; then
            HOST_PREFIX="${INSTALL_PATH%%/_actions/*}"
            CONTAINER_PREFIX="${GITHUB_WORKSPACE%/*/*}"
            if [ -n "$CONTAINER_PREFIX" ]; then
              INSTALL_PATH="${INSTALL_PATH/$HOST_PREFIX/$CONTAINER_PREFIX}"
              echo "Resolved container install path: $INSTALL_PATH"
            fi
          fi
          if [ ! -d "$INSTALL_PATH" ]; then
            echo "::error::Could not resolve membrowse package path. Tried: ${{ github.action_path }} and $INSTALL_PATH"
            exit 1
          fi
        fi
        ${{ steps.detect-python.outputs.python }} -m pip install --force-reinstall --no-cache-dir "$INSTALL_PATH"

    - name: Run memory analysis
      id: analysis
      shell: bash
      env:
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_ELF: ${{ inputs.elf }}
        INPUT_LD: ${{ inputs.ld }}
        INPUT_TARGET_NAME: ${{ inputs.target_name }}
        INPUT_API_KEY: ${{ inputs.api_key }}
        INPUT_API_URL: ${{ inputs.api_url }}
        INPUT_DONT_FAIL_ON_ALERTS: ${{ inputs.dont_fail_on_alerts }}
        INPUT_IDENTICAL: ${{ inputs.identical }}
        INPUT_LINKER_VARS: ${{ inputs.linker_vars }}
        INPUT_PR_AUTHOR_NAME: ${{ inputs.pr_author_name }}
        INPUT_PR_AUTHOR_EMAIL: ${{ inputs.pr_author_email }}
        INPUT_MAP_FILE: ${{ inputs.map_file }}
      run: |
        set -o pipefail

        # Global args (before subcommand)
        GLOBAL_ARGS=()
        if [ "$INPUT_VERBOSE" != "WARNING" ]; then
          GLOBAL_ARGS+=(--verbose "$INPUT_VERBOSE")
        fi

        # Subcommand args - start with positional args if provided
        ARGS=()

        # Add elf and ld only if provided (not required when identical=true)
        if [ -n "$INPUT_ELF" ]; then
          ARGS+=("$INPUT_ELF")
        fi
        if [ -n "$INPUT_LD" ]; then
          ARGS+=("$INPUT_LD")
        fi

        # Add required flags
        ARGS+=(
          --upload
          --github
          --target-name "$INPUT_TARGET_NAME"
          --api-key "$INPUT_API_KEY"
        )

        # Only pass api-url if explicitly provided and non-empty
        if [ -n "$INPUT_API_URL" ]; then
          ARGS+=(--api-url "$INPUT_API_URL")
        fi

        if [ "$INPUT_DONT_FAIL_ON_ALERTS" = "true" ]; then
          ARGS+=(--dont-fail-on-alerts)
        fi

        if [ "$INPUT_IDENTICAL" = "true" ]; then
          ARGS+=(--identical)
        fi

        # Add linker variable definitions
        if [ -n "$INPUT_LINKER_VARS" ]; then
          for var in $INPUT_LINKER_VARS; do
            ARGS+=(--def "$var")
          done
        fi

        # Add PR author info if provided
        if [ -n "$INPUT_PR_AUTHOR_NAME" ]; then
          ARGS+=(--pr-author-name "$INPUT_PR_AUTHOR_NAME")
        fi
        if [ -n "$INPUT_PR_AUTHOR_EMAIL" ]; then
          ARGS+=(--pr-author-email "$INPUT_PR_AUTHOR_EMAIL")
        fi

        # Add map file if provided
        if [ -n "$INPUT_MAP_FILE" ]; then
          ARGS+=(--map-file "$INPUT_MAP_FILE")
        fi

        # Run report command and save output to file. Capture exit status so
        # we can still surface the report path for budget-alert failures (exit 1
        # with a valid raw response written) while propagating the failure.
        REPORT_PATH="${RUNNER_TEMP}/membrowse_${INPUT_TARGET_NAME}.json"
        status=0
        membrowse "${GLOBAL_ARGS[@]}" report "${ARGS[@]}" --output-raw-response > "$REPORT_PATH" || status=$?

        if [ -s "$REPORT_PATH" ]; then
          echo "report_path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        fi

        exit "$status"

branding:
  icon: 'bar-chart-2'
  color: 'blue'
